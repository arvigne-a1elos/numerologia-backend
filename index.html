*{margin:0;padding:0;box-sizing:border-box}

.energy-hero h3{color:var(--gold);font-family:'Playfair Display',serif;font-size:1rem;margin-bottom:6px}
.energy-hero p{color:#aaa;font-size:.75rem;line-height:1.5;max-width:600px;margin:0 auto}
.legal-note{color:#555;font-size:.55rem;margin-top:6px;font-style:italic}
