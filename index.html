<!DOCTYPE html><html lang="pt-BR"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mapa Numerológico | A1ELOS</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;background:#0a0a0a;color:#fff}
#lang{position:fixed;top:0;width:100%;z-index:999;background:rgba(10,10,10,.95);border-bottom:1px solid #222;padding:5px 0;display:flex;justify-content:center;gap:3px;flex-wrap:wrap}
.lang-btn{background:0 0;border:1px solid #333;color:#aaa;padding:2px 5px;border-radius:4px;cursor:pointer;font-size:8px}
.lang-btn:hover,.lang-btn.active{border-color:#C9A94E;color:#C9A94E}
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 16px}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(1.5rem,5vw,3rem);color:#C9A94E;margin-bottom:4px}
.hero p{color:#888;font-size:.85rem;max-width:500px;margin:0 auto}
</style>
</head>
<body>
<div id="lang"></div>
<section class="hero">
<h1 data-i18n="tt">MAPA NUMEROLOGICO</h1>
<p data-i18n="sb">A plataforma de numerologia mais completa do mundo</p>
<p data-i18n="ds">Mapa pessoal, empresarial, artistico, eleitoral, energia de imoveis.</p>
</section>

<script>
var T={
pt:{tt:"MAPA NUMEROLOGICO",sb:"A plataforma de numerologia mais completa do mundo",ds:"Mapa pessoal, empresarial, artistico, eleitoral, energia de imoveis."},
en:{tt:"NUMEROLOGICAL MAP",sb:"The most complete numerology platform",ds:"Personal map, business, stage name, electoral, property energy."},
es:{tt:"MAPA NUMEROLOGICO",sb:"La plataforma de numerologia mas completa",ds:"Mapa personal, empresarial, artistico, electoral."},
it:{tt:"MAPPA NUMEROLOGICA",sb:"La piattaforma di numerologia piu completa",ds:"Mappa personale, aziendale, artistica, elettorale."},
fr:{tt:"CARTE NUMEROLOGIQUE",sb:"La plateforme de numerologie la plus complete",ds:"Carte personnelle, entreprise, artistique, electorale."},
de:{tt:"NUMEROLOGISCHE KARTE",sb:"Die vollstandigste Numerologie-Plattform",ds:"Personliche Karte, Unternehmen, Kunstler, Wahl."},
ja:{tt:"数秘術マップ",sb:"世界で最も完全な数秘術プラットフォーム",ds:"個人、ビジネス、芸名、選挙、不動産。"},
zh:{tt:"数字命理图",sb:"世界上最完整的数字命理平台",ds:"个人、商业、艺名、选举、房地产。"},
ru:{tt:"НУМЕРОЛОГИЧЕСКАЯ КАРТА",sb:"Самая полная платформа нумерологии",ds:"Личная, деловая, сценическая, избирательная."},
hi:{tt:"अंक ज्योतिष मानचित्र",sb:"दुनिया का सबसे संपूर्ण अंक ज्योतिष प्लेटफॉर्म",ds:"व्यक्तिगत, व्यावसायिक, कलात्मक, चुनावी।"},
ar:{tt:"خريطة الأرقام",sb:"أكمل منصة علم أرقام في العالم",ds:"شخصي، تجاري، فني، انتخابي。"},
he:{tt:"מפה נומרולוגית",sb:"הפלטפורמה השלמה ביותר בעולם לנומרולוגיה",ds:"אישי, עסקי, אמנותי, בחירות。"}};

var L=[{c:"pt",f:"🇧🇷"},{c:"en",f:"🇺🇸"},{c:"es",f:"🇪🇸"},{c:"it",f:"🇮🇹"},{c:"fr",f:"🇫🇷"},{c:"de",f:"🇩🇪"},{c:"ja",f:"🇯🇵"},{c:"zh",f:"🇨🇳"},{c:"ru",f:"🇷🇺"},{c:"hi",f:"🇮🇳"},{c:"ar",f:"🇸🇦"},{c:"he",f:"🇮🇱"}];

function SL(c){
 localStorage.setItem("lang",c);
 document.documentElement.lang=c;
 document.documentElement.dir=(c==="ar"||c==="he")?"rtl":"ltr";
 var bs=document.querySelectorAll(".lang-btn");
 for(var i=0;i<bs.length;i++)bs[i].className="lang-btn";
 for(var i=0;i<L.length;i++)if(L[i].c===c){bs[i].className="lang-btn active";break}
 var t=T[c]||T.en;
 var es=document.querySelectorAll("[data-i18n]");
 for(var i=0;i<es.length;i++){var k=es[i].getAttribute("data-i18n");if(t[k])es[i].innerText=t[k]}
}

var c=document.getElementById("lang");
for(var i=0;i<L.length;i++){
 var b=document.createElement("button");
 b.className="lang-btn";
 b.innerHTML=L[i].f+L[i].c.toUpperCase();
 b.onclick=(function(j){return function(){SL(L[j].c)}})(i);
 c.appendChild(b);
}

SL(localStorage.getItem("lang")||"pt");
</script>
</body>
</html>
